apiVersion: v1
kind: ConfigMap
metadata:
  name: {service}-mcp-config
  namespace: {namespace}
data:
  UPSTREAM_API_BASE_URL: "https://api.example.com"
  LOG_LEVEL: "INFO"
  DISABLE_AUTH: "false"
  OAUTH_VALIDATION_MODE: "jwks"
  JWKS_URI: "https://auth.example.com/.well-known/jwks.json"
  OAUTH_AUDIENCE: "https://api.{service}.example.com"
  OAUTH_ISSUER: "https://auth.example.com/"
