apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {service}-mcp
  namespace: {namespace}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Uncomment for TLS via cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - mcp-{service}.internal.example.com
  #     secretName: {service}-mcp-tls
  rules:
    - host: mcp-{service}.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {service}-mcp
                port:
                  name: http
