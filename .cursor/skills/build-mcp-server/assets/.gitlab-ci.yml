# GitLab CI/CD Pipeline for {service}-mcp
#
# Stages: test → build → deploy-staging (auto) → deploy-production (manual)
#
# Required GitLab CI/CD variables (Settings → CI/CD → Variables, masked):
#   KUBE_CONFIG_STAGING    — base64-encoded kubeconfig for staging cluster
#   KUBE_CONFIG_PRODUCTION — base64-encoded kubeconfig for production cluster
#   K8S_MCP_CLIENT_ID      — upstream API OAuth client ID
#   K8S_MCP_CLIENT_SECRET  — upstream API OAuth client secret
#
# Uses GitLab Container Registry ($CI_REGISTRY_IMAGE) for image storage.
# Replace {service} with your service name throughout.

stages:
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  PYTHON_VERSION: "3.11"

# ── Test ───────────────────────────────────────────────────────────────────

test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .pip-cache/
  before_script:
    - pip install --cache-dir .pip-cache -e ".[dev]"
  script:
    - pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Build & Push ──────────────────────────────────────────────────────────

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Tag with immutable commit SHA and mutable branch name
    - |
      docker build \
        --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
        --build-arg VCS_REF=$CI_COMMIT_SHA \
        -t $IMAGE_NAME:$IMAGE_TAG \
        -t $IMAGE_NAME:$CI_COMMIT_REF_SLUG \
        .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Shared deploy logic ────────────────────────────────────────────────────

.deploy:
  stage: deploy
  image: bitnami/kubectl:1.29
  script:
    # Write kubeconfig from CI variable
    - echo $KUBE_CONFIG | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig

    # Inject secrets idempotently (create or update — never fails if exists)
    - |
      kubectl create secret generic {service}-mcp-secrets \
        --namespace=$K8S_NAMESPACE \
        --from-literal=OAUTH_CLIENT_ID=$K8S_MCP_CLIENT_ID \
        --from-literal=OAUTH_CLIENT_SECRET=$K8S_MCP_CLIENT_SECRET \
        --dry-run=client -o yaml | kubectl apply -f -

    # Stamp the real image tag into the Deployment manifest
    - sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml

    # Apply all manifests
    - kubectl apply -f k8s/configmap.yaml
    - kubectl apply -f k8s/deployment.yaml
    - kubectl apply -f k8s/service.yaml
    - kubectl apply -f k8s/hpa.yaml

    # Wait for rollout — fails the job if pods don't become ready in 3 minutes
    - kubectl rollout status deployment/{service}-mcp --namespace=$K8S_NAMESPACE --timeout=3m

# ── Staging (automatic on merge to main) ──────────────────────────────────

deploy-staging:
  extends: .deploy
  variables:
    K8S_NAMESPACE: staging
    KUBE_CONFIG: $KUBE_CONFIG_STAGING
  environment:
    name: staging
    url: https://mcp-{service}.staging.internal
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Production (manual gate) ───────────────────────────────────────────────

deploy-production:
  extends: .deploy
  variables:
    K8S_NAMESPACE: production
    KUBE_CONFIG: $KUBE_CONFIG_PRODUCTION
  environment:
    name: production
    url: https://mcp-{service}.internal
  when: manual           # requires a human to click "deploy" in GitLab UI
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
